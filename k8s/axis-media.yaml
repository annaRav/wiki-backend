apiVersion: apps/v1
kind: Deployment
metadata:
  name: axis-media
  namespace: axis
  labels:
    app: axis-media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: axis-media
  template:
    metadata:
      labels:
        app: axis-media
    spec:
      initContainers:
      - name: wait-for-keycloak
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "Waiting for Keycloak to be ready..."
          until nc -z keycloak 8080; do
            echo "Keycloak is not ready yet. Waiting..."
            sleep 5
          done
          echo "Keycloak is ready!"
      - name: wait-for-postgres-app
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "Waiting for PostgreSQL to be ready..."
          until nc -z postgres-app 5432; do
            echo "PostgreSQL is not ready yet. Waiting..."
            sleep 5
          done
          echo "PostgreSQL is ready!"
      containers:
      - name: media
        image: axis/media:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8083
        env:
        - name: MEDIA_STORAGE_PATH
          value: "/var/media"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-app-secret
              key: POSTGRES_PASSWORD
        envFrom:
        - configMapRef:
            name: media-db-config
        volumeMounts:
        - name: media-storage
          mountPath: /var/media
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8083
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8083
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: media-storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: axis-media
  namespace: axis
  labels:
    app: axis-media
spec:
  type: ClusterIP
  ports:
  - port: 8083
    targetPort: 8083
    protocol: TCP
  selector:
    app: axis-media