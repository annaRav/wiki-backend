# Note: GatewayClass 'nginx' is already created by NGINX Gateway Fabric
# No need to create it again - it's managed by the controller
---
# Gateway - infrastructure layer (listeners, ports, TLS)
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: axis-gateway
  namespace: axis
spec:
  gatewayClassName: nginx
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Same
---
# HTTPRoute - routing rules for Keycloak (authentication)
# Routes all /realms/*, /resources/*, /js/* directly to Keycloak
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak-route
  namespace: axis
spec:
  parentRefs:
  - name: axis-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /realms
    backendRefs:
    - name: keycloak
      port: 8080
  - matches:
    - path:
        type: PathPrefix
        value: /resources
    backendRefs:
    - name: keycloak
      port: 8080
  - matches:
    - path:
        type: PathPrefix
        value: /js
    backendRefs:
    - name: keycloak
      port: 8080
  - matches:
    - path:
        type: PathPrefix
        value: /admin
    backendRefs:
    - name: keycloak
      port: 8080
---
# HTTPRoute - routing rules for Goal service
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: goal-route
  namespace: axis
spec:
  parentRefs:
  - name: axis-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/goals
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        add:
        - name: Access-Control-Allow-Origin
          value: "*"
        - name: Access-Control-Allow-Methods
          value: "GET, POST, PUT, DELETE, OPTIONS, PATCH"
        - name: Access-Control-Allow-Headers
          value: "Accept, Authorization, Content-Type, X-Requested-With"
    backendRefs:
    - name: axis-goal
      port: 8081
  - matches:
    - path:
        type: PathPrefix
        value: /api/goal-types
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        add:
        - name: Access-Control-Allow-Origin
          value: "*"
        - name: Access-Control-Allow-Methods
          value: "GET, POST, PUT, DELETE, OPTIONS, PATCH"
        - name: Access-Control-Allow-Headers
          value: "Accept, Authorization, Content-Type, X-Requested-With"
    backendRefs:
    - name: axis-goal
      port: 8081
  - matches:
    - path:
        type: PathPrefix
        value: /api/labels
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        add:
        - name: Access-Control-Allow-Origin
          value: "*"
        - name: Access-Control-Allow-Methods
          value: "GET, POST, PUT, DELETE, OPTIONS, PATCH"
        - name: Access-Control-Allow-Headers
          value: "Accept, Authorization, Content-Type, X-Requested-With"
    backendRefs:
    - name: axis-goal
      port: 8081
---
# HTTPRoute - Swagger UI for Goal service
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: goal-swagger-route
  namespace: axis
spec:
  parentRefs:
  - name: axis-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /goal/swagger-ui
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /swagger-ui
    backendRefs:
    - name: axis-goal
      port: 8081
  - matches:
    - path:
        type: PathPrefix
        value: /goal/api-docs
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /api-docs
    backendRefs:
    - name: axis-goal
      port: 8081
