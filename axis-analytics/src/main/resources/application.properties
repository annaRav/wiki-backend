quarkus.http.port=8085
quarkus.application.name=axis-analytics

# CORS Configuration - disabled (handled by Gateway)
quarkus.http.cors.enabled=false

# MongoDB
quarkus.mongodb.connection-string=mongodb://${MONGO_USERNAME:axis_admin}:${MONGO_PASSWORD:mongo_password}@${MONGO_HOST:mongodb}:${MONGO_PORT:27017}
quarkus.mongodb.database=analytics

# OIDC / Keycloak - Resource Server mode (validates Bearer tokens)
quarkus.oidc.auth-server-url=${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/axis}
quarkus.oidc.client-id=axis-backend
quarkus.oidc.credentials.secret=${KEYCLOAK_CLIENT_SECRET:secret}
quarkus.oidc.application-type=service
quarkus.oidc.discovery-enabled=true
quarkus.oidc.token.issuer=any

# Security
quarkus.http.auth.permission.public.paths=/q/*
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.options.paths=/api/*
quarkus.http.auth.permission.options.policy=permit
quarkus.http.auth.permission.options.methods=OPTIONS
quarkus.http.auth.permission.authenticated.paths=/api/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# RabbitMQ
mp.messaging.connector.smallrye-rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
mp.messaging.connector.smallrye-rabbitmq.port=${RABBITMQ_AMQP_PORT:5672}
mp.messaging.connector.smallrye-rabbitmq.username=${RABBITMQ_USERNAME:guest}
mp.messaging.connector.smallrye-rabbitmq.password=${RABBITMQ_PASSWORD:guest}
mp.messaging.connector.smallrye-rabbitmq.virtual-host=${RABBITMQ_VIRTUAL_HOST:axis}

mp.messaging.incoming.goal-events-in.connector=smallrye-rabbitmq
mp.messaging.incoming.goal-events-in.exchange.name=axis.goal.events
mp.messaging.incoming.goal-events-in.exchange.type=topic
mp.messaging.incoming.goal-events-in.exchange.durable=true
mp.messaging.incoming.goal-events-in.queue.name=analytics.goal.events
mp.messaging.incoming.goal-events-in.queue.durable=true
mp.messaging.incoming.goal-events-in.routing-keys=goal.event

# Health probes (match K8s expectations)
quarkus.smallrye-health.root-path=/actuator/health
quarkus.smallrye-health.liveness-path=liveness
quarkus.smallrye-health.readiness-path=readiness

# OpenAPI
quarkus.smallrye-openapi.path=/analytics/api-docs
quarkus.swagger-ui.path=/analytics/swagger-ui
quarkus.swagger-ui.always-include=true

# Virtual Threads (Java 21+)
quarkus.virtual-threads.enabled=true
quarkus.virtual-threads.name-prefix=vt-axis-analytics-

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.axis".level=DEBUG

%dev.quarkus.log.console.level=DEBUG
